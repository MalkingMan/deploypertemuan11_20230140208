<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="page">
    <section class="card">
        <h1 class="title">Register</h1>
        <p class="subtitle">Buat akun baru</p>

        <form class="form" th:action="@{/register}" method="post" th:object="${request}">

            <input class="input" type="text"
                   th:field="*{username}"
                   placeholder="Username" autocomplete="username">

            <input class="input" type="password"
                   th:field="*{password}"
                   placeholder="Password" autocomplete="new-password">

            <input class="input" type="text"
                   th:field="*{nama}"
                   placeholder="Nama" autocomplete="name">

            <input class="input" type="text"
                   th:field="*{alamat}"
                   placeholder="Alamat" autocomplete="street-address">

            <button class="button" type="submit">
                Register
            </button>

        </form>

        <p class="meta">Sudah punya akun? <a th:href="@{/login}">Login</a></p>
    </section>
</main>
</body>
</html>
