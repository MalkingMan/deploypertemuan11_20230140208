<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="page">
    <section class="card">
        <h1 class="title">Home</h1>
        <p class="subtitle">Akun Anda</p>

        <dl class="list">
            <div>
                <dt>Username</dt>
                <dd th:text="${user.username}"></dd>
            </div>
            <div>
                <dt>Nama</dt>
                <dd th:text="${profile.nama}"></dd>
            </div>
            <div>
                <dt>Alamat</dt>
                <dd th:text="${profile.alamat}"></dd>
            </div>
        </dl>

        <div class="actions">
            <a th:href="@{/logout}">Logout</a>
        </div>
    </section>
</main>

</body>
</html>
